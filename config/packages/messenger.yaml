framework:
    messenger:
        # failure_transport: failed
        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    auto_setup: true
            sync: 'sync://'
            # failed: 'doctrine://default?queue_name=failed'

        routing:
            App\Infrastructure\Queue\Message\SendNotificationMessage: async
            App\Infrastructure\Queue\Message\RetryNotificationMessage: async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
